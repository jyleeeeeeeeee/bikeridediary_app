name: brd_app
description: "BikeRideDiary - 바이크 라이더를 위한 정비/라이딩 관리 앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 상태관리 — Riverpod
  flutter_riverpod: ^2.6.1

  # HTTP 클라이언트 — Spring의 RestTemplate/WebClient 역할
  dio: ^5.7.0

  # 라우팅 — URL 기반 화면 전환
  go_router: ^14.8.1

  # JWT 토큰 안전 저장 — Android Keystore / iOS Keychain 사용
  flutter_secure_storage: ^9.2.4

  # 웹용 토큰 저장 (flutter_secure_storage가 웹에서 미지원)
  shared_preferences: ^2.3.4

  # Iterable 확장 메서드 (firstOrNull 등)
  collection: ^1.19.0

  # JSON 직렬화 — Spring의 Jackson 역할
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # JSON 코드 생성 — @JsonSerializable 어노테이션으로 fromJson/toJson 자동 생성
  json_serializable: ^6.9.4
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
