name: brd_app
description: "BikeRideDiary - 바이크 라이더를 위한 정비/라이딩 관리 앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  fluttertoast: ^8.2.8

  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 상태관리 — Riverpod
  flutter_riverpod: ^2.6.1

  # HTTP 클라이언트 — Spring의 RestTemplate/WebClient 역할
  dio: ^5.7.0

  # 라우팅 — URL 기반 화면 전환
  go_router: ^14.8.1

  # JWT 토큰 안전 저장 — Android Keystore / iOS Keychain 사용
  flutter_secure_storage: ^9.2.4

  # 웹용 토큰 저장 (flutter_secure_storage가 웹에서 미지원)
  shared_preferences: ^2.3.4

  # Iterable 확장 메서드 (firstOrNull 등)
  collection: ^1.19.0

  # JSON 직렬화 — Spring의 Jackson 역할
  json_annotation: ^4.9.0

  # 환경변수
  flutter_dotenv: ^5.2.1

  # 이미지 선택
  image_picker: ^1.1.2

  # Multipart 요청용 MIME type
  http_parser: ^4.0.2

  # 위치 (포그라운드 전용 — 라이딩 GPS 기록, 백그라운드 미사용)
  geolocator: ^14.0.2

  # 소셜 로그인
  kakao_flutter_sdk_user: ^1.9.5
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.6

  # 뱅킹각 측정 — 센서 스트림
  sensors_plus: ^6.1.0

  # 뱅킹 화면/녹화 중 자동 잠금 방지
  wakelock_plus: ^1.2.10

  # 뱅킹 세션 로컬 저장
  sqflite: ^2.4.1
  path: ^1.9.0
  path_provider: ^2.1.5

  # 시간 포맷
  intl: ^0.20.1

  # 세션 상세 각도 그래프
  fl_chart: ^0.69.0

  # 네트워크 연결 상태 감지 (오프라인 감지 + sync 트리거)
  connectivity_plus: ^6.0.5

  # 클라이언트 UUID 생성 (오프라인 create 즉시 ID 확정)
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # JSON 코드 생성 — @JsonSerializable 어노테이션으로 fromJson/toJson 자동 생성
  json_serializable: ^6.9.4
  build_runner: ^2.4.14
  image: ^4.9.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
